<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Animal Health - Caretaker Portal</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page" style="flex-direction: column;">

    <!-- Ambient glowing backgrounds -->
    <div class="ambient-glow glow-top-left"></div>
    <div class="ambient-glow glow-bottom-right"></div>

    <!-- Back Button -->
    <div style="position: absolute; top: 2rem; left: 2rem;">
        <a href="index.html" class="btn-secondary" style="padding: 8px 16px;">
            <i class="fas fa-arrow-left"></i> Portal Gateway
        </a>
    </div>

    <div class="glass-panel auth-container">
        <div class="auth-header">
            <div class="auth-logo" style="background: linear-gradient(135deg, var(--accent-emerald), var(--accent-blue)); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);">
                <i class="fas fa-paw"></i>
            </div>
            <h1 class="auth-title">Caretaker Portal</h1>
            <p class="auth-subtitle">Register profiles, log animal observations, and check scheduled vaccinations.</p>
        </div>

        <!-- Auth Tabs -->
        <div class="auth-tabs">
            <div id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
            <div id="tab-signup" class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</div>
        </div>

        <!-- Login Form -->
        <div id="form-login-wrapper" class="auth-form-wrapper active">
            <form id="login-form">
                <div class="form-group" style="margin-bottom: 1.2rem;">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" required placeholder="Enter caretaker username">
                </div>
                <div class="form-group" style="margin-bottom: 1.8rem;">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 12px; background: linear-gradient(135deg, var(--accent-emerald) 0%, var(--accent-blue) 100%); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);">
                    <i class="fas fa-right-from-bracket"></i> Caretaker Login
                </button>
            </form>
        </div>

        <!-- Signup Form -->
        <div id="form-signup-wrapper" class="auth-form-wrapper">
            <form id="signup-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" required placeholder="Choose a username">
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="signup-fullname">Full Name</label>
                    <input type="text" id="signup-fullname" required placeholder="Your full name">
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" required placeholder="yourname@domain.com">
                </div>
                <div class="form-group" style="margin-bottom: 1.8rem;">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="Choose a secure password">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 12px; background: linear-gradient(135deg, var(--accent-emerald) 0%, var(--accent-blue) 100%); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);">
                    <i class="fas fa-user-plus"></i> Initialize Account
                </button>
            </form>
        </div>

        <!-- Doctor Signup Form -->
        <div id="form-doctor-signup-wrapper" class="auth-form-wrapper">
            <form id="doctor-signup-form">
                <div class="form-group" style="margin-bottom: 0.8rem;">
                    <label for="doctor-signup-username">Username</label>
                    <input type="text" id="doctor-signup-username" required placeholder="Choose a username">
                </div>
                <div class="form-group" style="margin-bottom: 0.8rem;">
                    <label for="doctor-signup-fullname">Doctor Full Name</label>
                    <input type="text" id="doctor-signup-fullname" required placeholder="Dr. First Last">
                </div>
                <div class="form-group" style="margin-bottom: 0.8rem;">
                    <label for="doctor-signup-qualification">Qualification</label>
                    <input type="text" id="doctor-signup-qualification" required placeholder="e.g. BVSc & AH, MVSc">
                </div>
                <div class="form-group" style="margin-bottom: 0.8rem;">
                    <label for="doctor-signup-experience">Experience (Years)</label>
                    <input type="number" id="doctor-signup-experience" required min="0" placeholder="Years of veterinary experience">
                </div>
                <div class="form-group" style="margin-bottom: 0.8rem;">
                    <label for="doctor-signup-address">Clinic Address</label>
                    <input type="text" id="doctor-signup-address" required placeholder="Enter clinic address">
                </div>
                <div class="form-group" style="margin-bottom: 0.8rem;">
                    <label for="doctor-signup-email">Email Address</label>
                    <input type="email" id="doctor-signup-email" required placeholder="doctor@clinic.com">
                </div>
                <div class="form-group" style="margin-bottom: 0.8rem;">
                    <label for="doctor-signup-phone">Phone Number</label>
                    <input type="tel" id="doctor-signup-phone" required placeholder="10-digit phone number">
                </div>
                <div class="form-group" style="margin-bottom: 0.8rem;">
                    <label for="doctor-signup-certificate">Medical Course Certificate Details</label>
                    <input type="text" id="doctor-signup-certificate" required placeholder="Enter certificate number / verification details">
                </div>
                <div class="form-group" style="margin-bottom: 1.4rem;">
                    <label for="doctor-signup-password">Password</label>
                    <input type="password" id="doctor-signup-password" required placeholder="Choose a secure password">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 12px; background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%); box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);">
                    <i class="fas fa-user-doctor"></i> Submit Vet Registration
                </button>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <!-- Script loading -->
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth(false, false); // Check without auto-redirecting
            if (user) {
                if (user.role === 'Doctor') {
                    window.location.href = 'doctor_dashboard.html';
                } else if (user.role === 'Admin') {
                    window.location.href = 'caretakers.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const portal = params.get('portal');
            if (portal === 'vet') {
                document.title = "Smart Animal Health - Veterinary Portal";
                const titleEl = document.querySelector('.auth-title');
                if (titleEl) titleEl.textContent = "Veterinary Portal";
                const subtitleEl = document.querySelector('.auth-subtitle');
                if (subtitleEl) subtitleEl.textContent = "Verify clinical reports, override automated triages, and log vaccine completion notes.";
                const logoEl = document.querySelector('.auth-logo');
                if (logoEl) {
                    logoEl.style.background = "linear-gradient(135deg, var(--accent-cyan), var(--accent-blue))";
                    logoEl.style.boxShadow = "0 0 20px rgba(6, 182, 212, 0.4)";
                    logoEl.innerHTML = '<i class="fas fa-user-doctor"></i>';
                }
                
                const loginUserLabel = document.querySelector('label[for="login-username"]');
                if (loginUserLabel) loginUserLabel.textContent = "Veterinarian Username";
                const loginUserField = document.getElementById('login-username');
                if (loginUserField) loginUserField.placeholder = "Enter veterinarian username";

                const submitBtn = document.querySelector('#login-form button[type="submit"]');
                if (submitBtn) {
                    submitBtn.style.background = "linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%)";
                    submitBtn.style.boxShadow = "0 4px 15px rgba(6, 182, 212, 0.3)";
                    submitBtn.innerHTML = '<i class="fas fa-right-from-bracket"></i> Vet Login';
                }

                // Customize Active Tab color to Cyan for Vet Portal
                const styleSheet = document.createElement("style");
                styleSheet.innerText = `
                    .auth-tab.active {
                        color: var(--accent-cyan) !important;
                        border-bottom: 2px solid var(--accent-cyan) !important;
                    }
                `;
                document.head.appendChild(styleSheet);

                // Change signup tab text
                const signupTab = document.getElementById('tab-signup');
                if (signupTab) signupTab.textContent = "Vet Sign Up";
            }
        });

        function switchAuthTab(type) {
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');
            const formLogin = document.getElementById('form-login-wrapper');
            
            const params = new URLSearchParams(window.location.search);
            const isVet = params.get('portal') === 'vet';
            const formSignup = isVet ? document.getElementById('form-doctor-signup-wrapper') : document.getElementById('form-signup-wrapper');
            const alternativeSignup = isVet ? document.getElementById('form-signup-wrapper') : document.getElementById('form-doctor-signup-wrapper');

            if (type === 'login') {
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                formLogin.classList.add('active');
                formSignup.classList.remove('active');
                if (alternativeSignup) alternativeSignup.classList.remove('active');
            } else {
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                formSignup.classList.add('active');
                formLogin.classList.remove('active');
                if (alternativeSignup) alternativeSignup.classList.remove('active');
            }
        }

        // Login Handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/api/auth?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });
                const data = await res.json();

                if (data.success) {
                    showToast(data.message, 'success');
                    setTimeout(() => {
                        if (data.user && data.user.role === 'Doctor') {
                            window.location.href = 'doctor_dashboard.html';
                        } else if (data.user && data.user.role === 'Admin') {
                            window.location.href = 'caretakers.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 800);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('Authentication server error.', 'error');
            }
        });

        // Signup Handler
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signup-username').value;
            const fullName = document.getElementById('signup-fullname').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            try {
                const res = await fetch('/api/auth?action=signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&fullName=${encodeURIComponent(fullName)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
                });
                const data = await res.json();

                if (data.success) {
                    showToast(data.message, 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('Registration server error.', 'error');
            }
        });

        // Doctor Signup Handler
        document.getElementById('doctor-signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('doctor-signup-username').value;
            const fullName = document.getElementById('doctor-signup-fullname').value;
            const qualification = document.getElementById('doctor-signup-qualification').value;
            const experience = document.getElementById('doctor-signup-experience').value;
            const address = document.getElementById('doctor-signup-address').value;
            const email = document.getElementById('doctor-signup-email').value;
            const phoneNo = document.getElementById('doctor-signup-phone').value;
            const certificate = document.getElementById('doctor-signup-certificate').value;
            const password = document.getElementById('doctor-signup-password').value;

            try {
                const res = await fetch('/api/auth?action=signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&fullName=${encodeURIComponent(fullName)}&email=${encodeURIComponent(email)}&role=Doctor&qualification=${encodeURIComponent(qualification)}&experience=${encodeURIComponent(experience)}&address=${encodeURIComponent(address)}&phoneNo=${encodeURIComponent(phoneNo)}&certificate=${encodeURIComponent(certificate)}`
                });
                const data = await res.json();

                if (data.success) {
                    showToast(data.message, 'success');
                    document.getElementById('doctor-signup-form').reset();
                    setTimeout(() => switchAuthTab('login'), 2000);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('Registration server error.', 'error');
            }
        });
    </script>
</body>
</html>
