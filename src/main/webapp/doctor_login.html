<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Animal Health - Veterinary Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page" style="flex-direction: column;">

    <!-- Ambient glowing backgrounds -->
    <div class="ambient-glow glow-top-left"></div>
    <div class="ambient-glow glow-bottom-right"></div>

    <!-- Back Button -->
    <div style="position: absolute; top: 2rem; left: 2rem;">
        <a href="index.html" class="btn-secondary" style="padding: 8px 16px;">
            <i class="fas fa-arrow-left"></i> Portal Gateway
        </a>
    </div>

    <div class="glass-panel auth-container">
        <div class="auth-header">
            <div class="auth-logo" style="background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);">
                <i class="fas fa-user-doctor"></i>
            </div>
            <h1 class="auth-title">Veterinary Portal</h1>
            <p class="auth-subtitle">Verify clinical reports, override automated triages, and log vaccine completion notes.</p>
        </div>

        <!-- Login Form -->
        <div class="auth-form-wrapper active">
            <form id="doctor-login-form">
                <div class="form-group" style="margin-bottom: 1.2rem;">
                    <label for="doctor-username">Username</label>
                    <input type="text" id="doctor-username" required placeholder="Enter veterinarian username">
                </div>
                <div class="form-group" style="margin-bottom: 1.8rem;">
                    <label for="doctor-password">Password</label>
                    <input type="password" id="doctor-password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 12px;">
                    <i class="fas fa-right-from-bracket"></i> Doctor Authenticate
                </button>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <!-- Script loading -->
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth(false, true); // Redirect if already authenticated
        });

        // Doctor Login Handler
        document.getElementById('doctor-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('doctor-username').value;
            const password = document.getElementById('doctor-password').value;

            try {
                const res = await fetch('/api/auth?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });
                const data = await res.json();

                if (data.success) {
                    if (data.user && data.user.role === 'Doctor') {
                        showToast(data.message, 'success');
                        setTimeout(() => window.location.href = 'doctor_dashboard.html', 800);
                    } else {
                        // Logged in user is not a Doctor.
                        // Force logout backend session to keep states clean
                        await fetch('/api/auth?action=logout', { method: 'POST' });
                        showToast('Access denied. This portal is reserved for Veterinary staff.', 'error');
                    }
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('Authentication server error.', 'error');
            }
        });
    </script>
</body>
</html>
